<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REAL LIFE PONG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
<div id="container">
  <video id="webcam" autoplay muted playsinline></video>
  <div class="scanlines"></div>
  <canvas id="threeCanvas"></canvas>

  <div id="hud">
    <div id="scores">
      <span id="scoreLeft">0</span>
      <span id="scoreRight">0</span>
    </div>
    <div id="volley">VOLLEY: 0</div>
  </div>

  <div id="pointFlash"></div>

  <!-- Start screen -->
  <div class="screen" id="startScreen">
    <h1>REAL LIFE PONG</h1>
    <p>Stand back · Raise your hands · Use your WRISTS to control the paddles<br>
       Left hand = Left paddle &nbsp;|&nbsp; Right hand = Right paddle</p>

    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:420px;">
      <label style="color:#aaa;letter-spacing:3px;font-size:13px;">SELECT CAMERA</label>
      <select id="camSelect" class="camSelect">
        <option value="">⏳ Detecting cameras…</option>
      </select>
    </div>

    <button class="btn" id="startBtn">▶ START GAME</button>
  </div>

  <!-- Countdown screen -->
  <div class="screen hidden" id="countdownScreen">
    <h1 id="countdownText" style="font-size: clamp(80px, 20vw, 240px);">3</h1>
  </div>

  <!-- Game over screen -->
  <div class="screen hidden" id="gameOverScreen">
    <h1 id="winnerText">PLAYER 1 WINS!</h1>
    <p id="finalScore"></p>
    <button class="btn" id="restartBtn">↺ PLAY AGAIN</button>
  </div>

  <div id="statusMsg">Initialising camera & pose tracking…</div>
</div>

<!-- Scripts -->
<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script type="module" src="/src/main.js"></script>
</body>
</html>
